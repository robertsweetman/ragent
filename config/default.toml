# ragent default configuration
# Override these via CLI flags or a project-local ragent.toml

# Which LLM backend to use: "ollama" (default) or "openai".
# Switch to "openai" to use LM Studio (with GPU/NPU via DirectML) or a remote OpenAI key.
backend = "openai"

[ollama]
# URL where Ollama is running
url = "http://localhost:11434"
# Default model to use (must be pulled in Ollama first).
# Smaller models respond MUCH faster on CPU:
#   qwen2.5-coder:1.5b  -- very fast, good for quick edits
#   qwen2.5-coder:3b    -- good balance of speed and quality (recommended for CPU)
#   qwen2.5-coder:7b    -- better quality but slow to prefill on CPU
model = "qwen2.5-coder:3b"
# LLM temperature (0.0 = deterministic, 1.0 = creative). Optional.
# temperature = 0.7
# Context window size in tokens. Optional — uses model default if unset.
# context_window = 4096
# How long (seconds) to wait for Ollama before giving up.
# On CPU, the model must process ALL input tokens before generating its first
# output token (the "prefill" phase). With a large project-context system prompt
# this can take several minutes for a 7B model. Increase this value if you see
# "operation timed out" errors. Default: 600 (10 minutes).
# request_timeout_secs = 600

[agent]
# Maximum tool-call loop iterations before the agent stops.
# This is a safety limit to prevent infinite loops if the LLM keeps requesting tools.
max_iterations = 30
# The agent injects a "please wrap up" nudge 3 iterations before this limit,
# giving the model a chance to synthesise its findings rather than hard-stopping.
# System prompt that defines the agent's behaviour.
system_prompt = "You are a helpful AI assistant running locally via ragent. You have access to tools for reading files, writing files, searching files, and executing shell commands. Use them when appropriate to accomplish tasks. Be concise and helpful."

[tools.shell]
# Timeout in seconds for shell command execution.
timeout_secs = 30
# Maximum output size in bytes captured from shell commands (stdout + stderr).
max_output_bytes = 102400  # 100 KB
# Working directory for shell commands. Defaults to current directory if unset.
# working_directory = "."
# Override for CARGO_TARGET_DIR. Set to a short path to avoid Windows MAX_PATH
# issues. When a --workspace is active, ragent auto-sets this to {TEMP}/ragent-target
# unless you specify a value here. Uncomment to pin to a fixed location:
# cargo_target_dir = "C:\\Temp\\ragent-target"

[tools.file]
# Maximum file size in bytes that the file read tool will return.
max_read_bytes = 1048576  # 1 MB
# Maximum number of search results returned by the file search tool.
max_search_results = 50
# Base directory that file tools are restricted to. Prevents directory traversal.
# All file paths are resolved relative to this and must stay within it.
# Defaults to current directory if unset.
# sandbox_path = "C:\\Users\\you\\workspace"

# ---------------------------------------------------------------------------
# Phase 3: Skill and project context
# ---------------------------------------------------------------------------

[skill]
# Which built-in skill to use: "code" (code-writer) or "chat" (general assistant).
# Override per-session with: ragent --skill chat
name = "code"

[project]
# Automatically detect and inject project context (file tree + key files) into
# the system prompt when a workspace is set. The LLM starts with a mental model
# of the project structure, reducing the need to explore manually.
auto_detect = true
# Maximum directory depth for the file tree (0 = root only, 4 = default).
max_tree_depth = 2
# Maximum bytes to include from each key file (Cargo.toml, README, etc.).
max_key_file_bytes = 2048  # 16 KB

# ---------------------------------------------------------------------------
# OpenAI-compatible backend (LM Studio, Jan, remote OpenAI, etc.)
# Activate with: backend = "openai" at the top of this file.
# ---------------------------------------------------------------------------

[openai]
# Base URL of the OpenAI-compatible API server (no trailing slash).
# LM Studio default — start the server under Developer → Local Server.
url = "http://localhost:1234/v1"
# Model name exactly as shown in LM Studio's loaded-model dropdown.
# e.g. "qwen2.5-coder-3b-instruct" or whatever your loaded model is called.
model = "qwen3.5-4b"
# model = "google/gemma-4-e2b"
# API key: LM Studio accepts any non-empty string; leave unset for local use.
# api_key = "lm-studio"
# Same timeout semantics as [ollama] request_timeout_secs.
# request_timeout_secs = 600
